name: Bug Report
description: Report incorrect behavior in supported Workflow OS functionality.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Do not include secrets, credentials, or private payloads.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps To Reproduce
      description: Include exact commands or minimal files when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version Or Commit
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Redact sensitive information before submitting.
    validations:
      required: false
