name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust formatting
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Rust docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: Cargo lockfile validation
        run: cargo metadata --locked --format-version 1

  typescript:
    name: TypeScript And Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck --workspace @workflow-os/sdk-typescript

      - name: TypeScript lint
        run: npm run lint --workspace @workflow-os/sdk-typescript

      - name: TypeScript tests
        run: npm run test --workspace @workflow-os/sdk-typescript

      - name: Documentation checks
        run: npm run check:docs

      - name: npm lockfile validation
        run: npm ci --ignore-scripts

  contracts:
    name: Schema SDK And Example Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Workflow OS CLI
        run: cargo build -p workflow-cli --bin workflow-os

      - name: Check schema SDK and example synchronization
        run: npm run check:contracts

  read-only-integrations:
    name: Phase 2 Read-Only Integration Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Workflow OS CLI
        run: cargo build -p workflow-cli --bin workflow-os

      - name: Check read-only adapter contracts and fixture examples
        run: npm run check:integrations

  security:
    name: Dependency And Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust dependency audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: npm dependency audit
        run: npm audit --audit-level=moderate
