schema_version: workflowos.dev/v0
id: ex/gh
version: v0
display_name: GitHub Read-Only Review Context
description: Read pull request context through the GitHub read-only adapter and produce an approval-gated local recommendation summary.
owner:
  owning_team: workflow-os-maintainers
  maintainer: workflow-os
  escalation_contact: workflow-os
  lifecycle_status: experimental
autonomy_level: level_2
triggers:
  - id: manual-start
    kind: manual
state_model:
  type: inline
  states:
    - created
    - context_read
    - recommendation_ready
steps:
  - id: ctx
    skill_ref:
      id: adapter/gh
      version: v0
    input_mapping:
      - from:
          type: literal
          value: acme
        to: owner
      - from:
          type: literal
          value: widgets
        to: repo
      - from:
          type: literal
          value: "7"
        to: pull_number
      - from:
          type: literal
          value: main
        to: ref
    policy_requirements:
      - id: external/read
    idempotency_key_strategy:
      type: derived
    approval_policy:
      policy:
        id: approval/github-read-only
    timeout:
      duration: 5m
    terminal_behavior: fail_workflow
approval_requirements:
  - id: human-review-before-final-recommendation
    reason: Human approval is required before the fixture-backed context summary is treated as a final recommendation.
    expires_after:
      duration: 30m
cancellation_behavior: stop
audit_requirements:
  required: true
  events:
    - RunCreated
    - PolicyDecisionRecorded
    - ApprovalRequested
    - ApprovalGranted
    - SkillInvocationRequested
    - SkillInvocationSucceeded
  store_references_only: true
observability_requirements:
  metrics:
    - workflow_latency
    - policy_decision_count
    - approval_wait_time
    - skill_latency
  tracing: true
  latency_tracking: true
tags:
  - github-read-only
  - fixture
  - review-context
