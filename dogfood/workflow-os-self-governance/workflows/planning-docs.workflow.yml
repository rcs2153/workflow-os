schema_version: workflowos.dev/v0
id: dg/d
version: v0
display_name: Workflow OS Self-Governance Dogfood
description: Govern a Workflow OS planning or documentation task through multiple local kernel checkpoints before Codex or a human performs repository edits.
owner:
  owning_team: workflow-os-maintainers
  maintainer: workflow-os
  escalation_contact: workflow-os
  lifecycle_status: experimental
autonomy_level: level_2
triggers:
  - id: manual-start
    kind: manual
state_model:
  type: inline
  states:
    - requested
    - scoped
    - approved
    - handed_off
    - validation_disclosed
    - report_posture_recorded
steps:
  - id: scope-requested
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: workflow-os-planning-docs-task
        to: task_kind
      - from:
          type: literal
          value: scope-requested-kernel-governed-codex-executed
        to: dogfood_boundary
    policy_requirements:
      - id: approval/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: planning-approved
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: workflow-os-planning-docs-task
        to: task_kind
      - from:
          type: literal
          value: planning-approval-required-before-codex-or-human-edits
        to: dogfood_boundary
    policy_requirements:
      - id: approval/d
    idempotency_key_strategy:
      type: derived
    approval_policy:
      policy:
        id: approval/d
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: implementation-handoff
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: workflow-os-planning-docs-task
        to: task_kind
      - from:
          type: literal
          value: implementation-handoff-remains-codex-or-human-executed
        to: dogfood_boundary
    policy_requirements:
      - id: approval/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: validation-disclosure
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: workflow-os-planning-docs-task
        to: task_kind
      - from:
          type: literal
          value: validation-runs-outside-kernel-unless-separately-scoped
        to: dogfood_boundary
    policy_requirements:
      - id: approval/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: review-and-report-posture
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: workflow-os-planning-docs-task
        to: task_kind
      - from:
          type: literal
          value: final-review-and-report-remain-human-authored
        to: dogfood_boundary
    policy_requirements:
      - id: approval/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: fail_workflow
cancellation_behavior: stop
audit_requirements:
  required: true
  events:
    - RunCreated
    - PolicyDecisionRecorded
    - ApprovalRequested
    - ApprovalGranted
    - RunResumed
    - SkillInvocationSucceeded
    - RunCompleted
  store_references_only: true
observability_requirements:
  metrics:
    - workflow_latency
    - policy_decision_count
    - approval_wait_time
    - skill_latency
  tracing: true
  latency_tracking: true
tags:
  - dogfood
  - self-governance
  - planning
  - docs
