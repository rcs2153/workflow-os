schema_version: workflowos.dev/v0
id: dg/runtime-composition
version: v0
display_name: Workflow OS Runtime Composition Dogfood
description: Govern runtime-composition phases that connect already-built primitives into explicit executor paths without adding writes or broad automation.
owner:
  owning_team: workflow-os-maintainers
  maintainer: workflow-os
  escalation_contact: workflow-os
  lifecycle_status: experimental
autonomy_level: level_2
triggers:
  - id: manual-start
    kind: manual
state_model:
  type: inline
  states:
    - requested
    - primitives_scoped
    - integration_path_scoped
    - composition_approved
    - implementation_handoff
    - validation_disclosed
    - report_recorded
steps:
  - id: primitive-scope
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: runtime-composition
        to: task_kind
      - from:
          type: literal
          value: identify-built-primitives-and-reject-new-primitive-families
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: integration-path
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: runtime-composition
        to: task_kind
      - from:
          type: literal
          value: choose-explicit-opt-in-executor-path-and-preserve-semantics
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: composition-approved
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: runtime-composition
        to: task_kind
      - from:
          type: literal
          value: approval-required-before-composing-runtime-path
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    approval_policy:
      policy:
        id: approval/d
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: implementation-handoff
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: runtime-composition
        to: task_kind
      - from:
          type: literal
          value: agent-or-human-edits-code-outside-kernel
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: validation-disclosure
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: runtime-composition
        to: task_kind
      - from:
          type: literal
          value: disclose-runtime-tests-format-clippy-docs-and-skips
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: composition-report
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: runtime-composition
        to: task_kind
      - from:
          type: literal
          value: report-scope-validation-semantics-limits-next-phase
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: fail_workflow
cancellation_behavior: stop
audit_requirements:
  required: true
  events:
    - RunCreated
    - PolicyDecisionRecorded
    - ApprovalRequested
    - ApprovalGranted
    - RunResumed
    - SkillInvocationSucceeded
    - RunCompleted
  store_references_only: true
observability_requirements:
  metrics:
    - workflow_latency
    - policy_decision_count
    - approval_wait_time
    - skill_latency
  tracing: true
  latency_tracking: true
tags:
  - dogfood
  - self-governance
  - runtime-composition
  - phase-execution
