schema_version: workflowos.dev/v0
id: dg/blocker
version: v0
display_name: Workflow OS Blocker Fix Dogfood
description: Govern focused blocker fixes from original finding restatement through regression validation and fix report handoff.
owner:
  owning_team: workflow-os-maintainers
  maintainer: workflow-os
  escalation_contact: workflow-os
  lifecycle_status: experimental
autonomy_level: level_2
triggers:
  - id: manual-start
    kind: manual
state_model:
  type: inline
  states:
    - requested
    - blocker_repeated
    - fix_boundary_scoped
    - fix_approved
    - implementation_handoff
    - regression_validated
    - report_recorded
steps:
  - id: blocker-restatement
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: blocker-fix
        to: task_kind
      - from:
          type: literal
          value: restate-original-blocker-and-affected-boundary
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: fix-boundary
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: blocker-fix
        to: task_kind
      - from:
          type: literal
          value: keep-fix-minimal-and-reject-feature-expansion
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: fix-approved
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: blocker-fix
        to: task_kind
      - from:
          type: literal
          value: approval-required-before-blocker-fix-edits
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    approval_policy:
      policy:
        id: approval/d
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: implementation-handoff
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: blocker-fix
        to: task_kind
      - from:
          type: literal
          value: agent-or-human-applies-focused-fix-outside-kernel
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: regression-validation
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: blocker-fix
        to: task_kind
      - from:
          type: literal
          value: prove-blocker-regression-and-existing-tests
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: continue
  - id: fix-report
    skill_ref:
      id: local/d
      version: v0
    input_mapping:
      - from:
          type: literal
          value: blocker-fix
        to: task_kind
      - from:
          type: literal
          value: report-blocker-fixed-validation-limits-next-phase
        to: dogfood_boundary
    policy_requirements:
      - id: local/d
    idempotency_key_strategy:
      type: derived
    timeout:
      duration: 5m
    terminal_behavior: fail_workflow
cancellation_behavior: stop
audit_requirements:
  required: true
  events:
    - RunCreated
    - PolicyDecisionRecorded
    - ApprovalRequested
    - ApprovalGranted
    - RunResumed
    - SkillInvocationSucceeded
    - RunCompleted
  store_references_only: true
observability_requirements:
  metrics:
    - workflow_latency
    - policy_decision_count
    - approval_wait_time
    - skill_latency
  tracing: true
  latency_tracking: true
tags:
  - dogfood
  - self-governance
  - blocker-fix
  - regression
